name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skilltrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skilltrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skilltrack_test
      JWT_SECRET_KEY: test-secret-key-for-ci
      CORS_ORIGINS: http://localhost:3000
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: test-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Verify backend imports
        run: |
          python -m compileall main.py config.py database.py models.py schemas.py routers alembic
          python -c "from main import app; print(app.title)"

      - name: Run backend tests if present
        run: |
          if find . -path ./frontend -prune -o -name "test_*.py" -print -quit | grep -q .; then
            pytest
          else
            echo "No backend tests found. Skipping pytest."
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
