services:
  db:
    image: postgres:15
    container_name: skilltrack-db
    restart: always
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: skilltrack-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: skilltrack-api
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  postgres_data:
